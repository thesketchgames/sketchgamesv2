<!DOCTYPE html>
<html>
  <head>
    <title>Sketch Games</title>
    <style>
      body {
        background: linear-gradient(135deg, #0a0015 0%, #1a0033 50%, #2d0052 100%);
        background-attachment: fixed;
        margin: 0;
        padding: 20px;
        font-family: 'Arial', sans-serif;
        position: relative;
        overflow-x: hidden;
      }

      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 20% 50%, rgba(138, 43, 226, 0.1) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(0, 191, 255, 0.1) 0%, transparent 50%);
        pointer-events: none;
        z-index: 1;
      }

      h1 {
        color: #00bfff;
        font-size: 30px;
        text-shadow: 0 0 20px rgba(0, 191, 255, 0.8), 0 0 40px rgba(138, 43, 226, 0.6);
        position: relative;
        z-index: 2;
      }

      h2 {
        color: #ffd700;
        font-size: 20px;
        text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        position: relative;
        z-index: 2;
      }

      div {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
        position: relative;
        z-index: 2;
      }

      a {
        text-decoration: none;
        display: inline-block;
        transition: all 0.3s ease;
        position: relative;
      }

      a:hover {
        transform: scale(1.1) rotateY(5deg);
        filter: brightness(1.2);
      }

      .game-wrapper {
        position: relative;
        display: inline-block;
      }

      img {
        height: 150px;
        border-radius: 30px;
        transition: all 0.3s ease;
        box-shadow: 0 0 20px rgba(0, 191, 255, 0.3);
        border: 2px solid rgba(0, 191, 255, 0.5);
        display: block;
      }

      img:hover {
        box-shadow: 0 0 40px rgba(0, 191, 255, 0.8), 0 0 60px rgba(138, 43, 226, 0.6);
        border-color: #ffd700;
        filter: brightness(0.6);
      }

      .game-name {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.7);
        color: #ffd700;
        padding: 10px 15px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: bold;
        text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        opacity: 0;
        transition: opacity 0.3s ease;
        pointer-events: none;
        white-space: nowrap;
      }

      a:hover .game-name {
        opacity: 1;
      }
    </style>
  </head>
  
  <body>
    <h1>Sketch Games, by TheSketchjpg and xhbshefj</h1>
    <h2>Play your Favorite games here</h2>
    <div id="gamesContainer">
      <a href="/games/1.html">
        <div class="game-wrapper">
          <img src="/i/1.png" alt="bad piggies">
          <div class="game-name">Bad Piggies</div>
        </div>
      </a>
      <a href="/games/2.html">
        <div class="game-wrapper">
          <img src="/i/2.png" alt="geometry dash">
          <div class="game-name">Geometry Dash</div>
        </div>
      </a>
      <a href="/games/3.html">
        <div class="game-wrapper">
          <img src="/i/3.png" alt="FNAF">
          <div class="game-name">FNAF</div>
        </div>
      </a>
      <a href="/games/4.html">
        <div class="game-wrapper">
          <img src="/i/4.png" alt="Stickman Hook">
          <div class="game-name">Stickman Hook</div>
        </div>
      </a>
      <a href="/games/5.html">
        <div class="game-wrapper">
          <img src="/i/5.png" alt="Crazy Cattle 3D">
          <div class="game-name">Crazy Cattle 3D</div>
        </div>
      </a>
      <a href="/games/6.html">
        <div class="game-wrapper">
          <img src="/i/6.png" alt="Crossy Road">
          <div class="game-name">Crossy Road</div>
        </div>
      </a>
      <a href="/games/7.html">
        <div class="game-wrapper">
          <img src="/i/7.png" alt="a small world cup">
          <div class="game-name">a small world cup</div>
        </div>
      </a>
    </div>

    <script>
      // Sort games alphabetically by alt text
      const container = document.getElementById('gamesContainer');
      const games = Array.from(container.children);
      
      games.sort((a, b) => {
        const altA = a.querySelector('img').alt.toLowerCase();
        const altB = b.querySelector('img').alt.toLowerCase();
        return altA.localeCompare(altB);
      });
      
      games.forEach(game => container.appendChild(game));
    </script>
  </body>
</html>
