<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>sketch games</title>
  <link rel="icon" type="image/x-icon" href="/i/favicon.png">
  <script src="/atlas.register.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, #0a0015 0%, #1a0033 50%, #2d0052 100%);
      background-attachment: fixed;
      margin: 0;
      padding: 20px;
      font-family: 'Arial', sans-serif;
      position: relative;
      overflow-x: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(138, 43, 226, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(0, 191, 255, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 1;
    }

    h1 {
      position: relative;
      z-index: 2;
      text-align: center;
      color: #00bfff;
      font-size: 24px;
      text-shadow: 0 0 20px rgba(0, 191, 255, 0.8), 0 0 40px rgba(138, 43, 226, 0.6);
      margin: 0;
      margin-bottom: 20px;
    }

    h1 span {
      color: #00bfff;
      font-size: 24px;
      margin-left: 0;
    }

    div {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      max-width: 400px;
    }

    input {
      width: 100%;
      background: rgba(26, 0, 51, 0.5);
      border: 2px solid rgba(0, 191, 255, 0.5);
      color: #00bfff;
      font-family: 'Arial', sans-serif;
      font-size: 16px;
      padding: 12px;
      outline: none;
      border-radius: 8px;
      text-shadow: 0 0 10px rgba(0, 191, 255, 0.6);
      transition: all 0.3s ease;
    }

    input:focus {
      border-color: #ffd700;
      box-shadow: 0 0 20px rgba(0, 191, 255, 0.8), 0 0 40px rgba(138, 43, 226, 0.6);
    }

    input::placeholder {
      color: rgba(0, 191, 255, 0.5);
    }

    button {
      display: none;
    }

    .links {
      margin-top: 20px;
      display: flex;
      gap: 1rem;
      font-size: 16px;
    }

    .links a {
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s ease;
      color: #ffd700;
      text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
    }

    .links a:hover {
      transform: scale(1.1);
      filter: brightness(1.2);
    }

    .wrap {
      text-align: center;
      width: 100%;
      max-width: 500px;
    }

    img {
      height: 200px;
      margin-bottom: 20px;
      border-radius: 30px;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(0, 191, 255, 0.3);
      border: 2px solid rgba(0, 191, 255, 0.5);
    }

    img:hover {
      box-shadow: 0 0 40px rgba(0, 191, 255, 0.8), 0 0 60px rgba(138, 43, 226, 0.6);
      border-color: #ffd700;
      transform: scale(1.1);
    }
  </style>
</head>
<body>

  <!-- Dynamic Interactive Aura Background Layer -->
  <script>
    const canvas = document.createElement('canvas');
    canvas.style.position = 'fixed';
    canvas.style.top = '0';
    canvas.style.left = '0';
    canvas.style.width = '100vw';
    canvas.style.height = '100vh';
    canvas.style.zIndex = '1';
    canvas.style.pointerEvents = 'none';
    document.body.prepend(canvas);

    const ctx = canvas.getContext('2d');
    let particles = [];
    const mouse = { x: null, y: null, radius: 150 };

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener('mouseleave', () => {
      mouse.x = null;
      mouse.y = null;
    });

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.radius = Math.random() * 40 + 20; 
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.color = Math.random() > 0.5 ? 'rgba(0, 191, 255,' : 'rgba(138, 43, 226,';
        this.alpha = Math.random() * 0.15 + 0.05;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        if (this.x < -this.radius) this.x = canvas.width + this.radius;
        if (this.x > canvas.width + this.radius) this.x = -this.radius;
        if (this.y < -this.radius) this.y = canvas.height + this.radius;
        if (this.y > canvas.height + this.radius) this.y = -this.radius;

        if (mouse.x !== null && mouse.y !== null) {
          let dx = mouse.x - this.x;
          let dy = mouse.y - this.y;
          let distance = Math.sqrt(dx * dx + dy * dy);
          
          if (distance < mouse.radius) {
            let force = (mouse.radius - distance) / mouse.radius;
            let dirX = dx / distance;
            let dirY = dy / distance;
            
            this.x -= dirX * force * 3;
            this.y -= dirY * force * 3;
          }
        }
      }

      draw() {
        let gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
        gradient.addColorStop(0, `${this.color} ${this.alpha})`);
        gradient.addColorStop(1, `${this.color} 0)`);
        
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();
      }
    }

    function init() {
      particles = [];
      const particleCount = Math.floor((canvas.width * canvas.height) / 15000);
      for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animate);
    }

    init();
    animate();
    window.addEventListener('resize', init);
  </script>

  <div class="wrap">
    <img src="/i/logo.png" alt="sketch games logo">
    <h1>Sketch Games<span>by thesketchjpg and xhbshefj</span></h1>
    <form id="f">
      <input id="u" type="text" placeholder="search sketch games." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </form>
    <div class="links">
      <a href="https://github.com/thesketchgames/sketchgamesv2/" target="_blank">github</a>
    </div>
  </div>
  <script>
    !function(){
      function enc(u){
        try{return btoa(encodeURIComponent(u)).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"")}
        catch(e){return null}
      }
      function norm(s){
        s=s.trim();
        if(!s)return null;
        if(/^https?:\/\//i.test(s)){
          try{new URL(s);return s}catch(e){}
          return null;
        }
        if(/\.|^localhost(:\d+)?$/.test(s)){
          try{new URL("https://"+s);return"https://"+s}catch(e){}
        }
        return"https://duckduckgo.com/?q="+encodeURIComponent(s);
      }
      document.getElementById("f").onsubmit=function(e){
        e.preventDefault();
        var v=document.getElementById("u").value;
        var n=norm(v);if(!n)return;
        var c=enc(n);if(!c)return;
        location.href="/atlas/"+c;
      };
    }();
  </script>
</body>
</html>
