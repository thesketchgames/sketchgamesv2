<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>sketch games</title>
  <link rel="icon" type="image/x-icon" href="/i/favicon.png">
  <script src="/atlas.register.js"></script>
  <style>
    body {
      background: #0a0015;
      margin: 0;
      padding: 20px;
      font-family: 'Arial', sans-serif;
      position: relative;
      overflow-x: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(138, 43, 226, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(0, 191, 255, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 1;
    }

    h1 {
      position: relative;
      z-index: 2;
      text-align: center;
      color: #00bfff;
      font-size: 24px;
      text-shadow: 0 0 20px rgba(0, 191, 255, 0.8), 0 0 40px rgba(138, 43, 226, 0.6);
      margin: 0;
      margin-bottom: 20px;
    }

    h1 span {
      color: #00bfff;
      font-size: 24px;
      margin-left: 0;
    }

    div {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      max-width: 400px;
    }

    input {
      width: 100%;
      background: rgba(26, 0, 51, 0.5);
      border: 2px solid rgba(0, 191, 255, 0.5);
      color: #00bfff;
      font-family: 'Arial', sans-serif;
      font-size: 16px;
      padding: 12px;
      outline: none;
      border-radius: 8px;
      text-shadow: 0 0 10px rgba(0, 191, 255, 0.6);
      transition: all 0.3s ease;
    }

    input:focus {
      border-color: #ffd700;
      box-shadow: 0 0 20px rgba(0, 191, 255, 0.8), 0 0 40px rgba(138, 43, 226, 0.6);
    }

    input::placeholder {
      color: rgba(0, 191, 255, 0.5);
    }

    button {
      display: none;
    }

    .links {
      margin-top: 20px;
      display: flex;
      gap: 1rem;
      font-size: 16px;
    }

    .links a {
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s ease;
      color: #ffd700;
      text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
    }

    .links a:hover {
      transform: scale(1.1);
    }

    .wrap {
      text-align: center;
      width: 100%;
      max-width: 500px;
    }

    img {
      height: 200px;
      margin-bottom: 20px;
      border-radius: 30px;
      transition: all 0.3s ease;
      /* Makes the middle of the logo image transparent */
      background: transparent;
      /* Sharp neon cyan outline with matching outer bloom effect */
      border: 3px solid #00f3ff;
      box-shadow: 0 0 15px #00f3ff, inset 0 0 15px #00f3ff;
    }

    img:hover {
      transform: scale(1.1);
      /* Intensifies the neon glow on hover */
      box-shadow: 0 0 25px #00f3ff, inset 0 0 25px #00f3ff;
    }
  </style>
</head>
<body>

  <!-- Dynamic Interactive Neon Aura Background Layer -->
  <script>
    const canvas = document.createElement('canvas');
    canvas.style.position = 'fixed';
    canvas.style.top = '0';
    canvas.style.left = '0';
    canvas.style.width = '100vw';
    canvas.style.height = '100vh';
    canvas.style.zIndex = '1';
    canvas.style.pointerEvents = 'none';
    document.body.prepend(canvas);

    const ctx = canvas.getContext('2d');
    let particles = [];
    const mouse = { x: null, y: null, radius: 170 };

    let currentBg = { r: 10, g: 0, b: 21 };

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener('mouseleave', () => {
      mouse.x = null;
      mouse.y = null;
    });

    const neonPalette = [
      { base: 'rgba(0, 243, 255,',   r: 0,   g: 243, b: 255 },
      { base: 'rgba(188, 0, 255,',   r: 188, g: 0,   b: 255 },
      { base: 'rgba(255, 0, 127,',   r: 255, g: 0,   b: 127 },
      { base: 'rgba(57, 255, 20,',   r: 57,  g: 255, b: 20  }
    ];

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.radius = Math.random() * 14 + 7;
        this.vx = (Math.random() - 0.5) * 0.9;
        this.vy = (Math.random() - 0.5) * 0.9;
        
        this.colorData = neonPalette[Math.floor(Math.random() * neonPalette.length)];
        this.color = this.colorData.base;
        this.alpha = Math.random() * 0.4 + 0.4;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        if (this.x < -this.radius) this.x = canvas.width + this.radius;
        if (this.x > canvas.width + this.radius) this.x = -this.radius;
        if (this.y < -this.radius) this.y = canvas.height + this.radius;
        if (this.y > canvas.height + this.radius) this.y = -this.radius;

        if (mouse.x !== null && mouse.y !== null) {
          let dx = mouse.x - this.x;
          let dy = mouse.y - this.y;
          let distance = Math.sqrt(dx * dx + dy * dy);
          
          if (distance < mouse.radius && distance > 0) {
            let force = (mouse.radius - distance) / mouse.radius;
            let dirX = dx / distance;
            let dirY = dy / distance;
            
            this.x -= dirX * force * 4.5;
            this.y -= dirY * force * 4.5;
          }
        }
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = `${this.color} ${this.alpha})`;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius + 4, 0, Math.PI * 2);
        ctx.strokeStyle = `${this.color} ${this.alpha * 0.6})`;
        ctx.lineWidth = 2.5;
        ctx.stroke();
      }
    }

    function init() {
      particles = [];
      const particleCount = Math.floor((canvas.width * canvas.height) / 11000);
      for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
      }
    }

    function animate() {
      let targetR = 10, targetG = 0, targetB = 21;
      let influenceCount = 1;

      if (mouse.x !== null && mouse.y !== null) {
        particles.forEach(p => {
          let dx = mouse.x - p.x;
          let dy = mouse.y - p.y;
          let dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < mouse.radius * 2) {
            let weight = (mouse.radius * 2 - dist) / (mouse.radius * 2);
            targetR += p.colorData.r * weight * 0.015;
            targetG += p.colorData.g * weight * 0.015;
            targetB += p.colorData.b * weight * 0.015;
            influenceCount += weight * 0.015;
          }
        });
      }

      currentBg.r += ((targetR / influenceCount) - currentBg.r) * 0.01;
      currentBg.g += ((targetG / influenceCount) - currentBg.g) * 0.01;
      currentBg.b += ((targetB / influenceCount) - currentBg.b) * 0.01;

      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = `rgb(${Math.floor(currentBg.r)}, ${Math.floor(currentBg.g)}, ${Math.floor(currentBg.b)})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.globalCompositeOperation = 'screen';
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animate);
    }

    init();
    animate();
    window.addEventListener('resize', init);
  </script>

  <div class="wrap">
    <img src="/i/logo.png" alt="sketch games logo">
    <h1>Sketch Games<span>by thesketchjpg and xhbshefj</span></h1>
    <form id="f">
      <input id="u" type="text" placeholder="search sketch games." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </form>
    <div class="links">
      <a href="https://github.com" target="_blank">github</a>
    </div>
  </div>
  <script>
    !function(){
      function enc(u){
        try{return btoa(encodeURIComponent(u)).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"")}
        catch(e){return null}
      }
      function norm(s){
        s=s.trim();
        if(!s)return null;
        if(/^https?:\/\//i.test(s)){
          try{new URL(s);return s}catch(e){}
          return null;
        }
        if(/\.|^localhost(:\d+)?$/.test(s)){
          try{new URL("https://"+s);return"https://"+s}catch(e){}
        }
        return"https://duckduckgo.com"+encodeURIComponent(s);
      }
      document.getElementById("f").onsubmit=function(e){
        e.preventDefault();
        var v=document.getElementById("u").value;
        var n=norm(v);if(!n)return;
        var c=enc(n);if(!c)return;
        location.href="/atlas/"+c;
      };
    }();
  </script>
</body>
</html>
