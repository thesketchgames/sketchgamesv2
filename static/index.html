<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sketch games</title>
  <link rel="icon" type="i/x-icon" href="/i/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Parkinsans:wght@700;800&display=swap" rel="stylesheet">
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
   <script>
        alert("hey so ik this site is kinda bad but i am trying my best to help thesketchjpg make his site better");

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(135deg, #0a0015 0%, #1a0033 50%, #2d0052 100%);
      background-attachment: fixed;
      color: #00bfff;
      font-family: 'Arial', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(138, 43, 226, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(0, 191, 255, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
      position: relative;
      z-index: 1;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 0.6rem 1.5rem;
      background: rgba(8, 8, 12, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
      z-index: 10;
      position: relative;
    }

    .nav-logo {
      position: absolute;
      left: 1.25rem;
      font-family: 'Parkinsans', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      color: #00bfff;
      text-shadow: 0 0 20px rgba(0, 191, 255, 0.8), 0 0 40px rgba(138, 43, 226, 0.6);
      letter-spacing: -0.01em;
      pointer-events: none;
    }

    nav button {
      background: transparent;
      border: none;
      color: #555;
      font-family: 'Arial', sans-serif;
      font-size: 0.8rem;
      padding: 0.4rem 1rem;
      cursor: pointer;
      border-radius: 999px;
      transition: background 0.15s, color 0.15s;
    }

    nav button:hover {
      background: rgba(255, 255, 255, 0.06);
      color: #00bfff;
      text-shadow: 0 0 10px rgba(0, 191, 255, 0.6);
    }

    nav button.active {
      background: rgba(0, 191, 255, 0.2);
      color: #00bfff;
      text-shadow: 0 0 15px rgba(0, 191, 255, 0.8);
    }
  </style>
</head>
<body>

  <iframe id="frame" src="/home.html" name="main"></iframe>

  <nav>
    <div class="nav-logo">
Sketch Games
    </div>

  
    <button id="btn-home" class="active" onclick="loadPage('/home.html', this)">home</button>
    <button id="btn-games" onclick="loadPage('/games/', this)">games</button>

  </nav>

  <script>
    function loadPage(url, btn) {
      const frame = document.getElementById('frame');
      
      frame.src = url;
      
      document.querySelectorAll('nav button').forEach(button => {
        button.classList.remove('active');
      });

      btn.classList.add('active');
    }
  </script>
</body>
</html>
